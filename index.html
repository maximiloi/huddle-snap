<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HuddleSnap" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>HuddleSnap</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      overflow: hidden;
      user-select: none;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      letter-spacing: 2px;
      color: #fbbf24;
      text-transform: uppercase;
    }

    .setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
    }

    .setup label {
      font-size: 18px;
      color: #cbd5e1;
    }

    .setup select {
      font-size: 28px;
      padding: 12px 24px;
      border-radius: 12px;
      border: 2px solid #334155;
      background: #1e293b;
      color: #f1f5f9;
      text-align: center;
    }

    .btn-ball {
      flex: 1;
      width: 100%;
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: white;
      border: none;
      border-radius: 24px;
      box-shadow: 0 8px 0 #14532d, 0 12px 24px rgba(0, 0, 0, .4);
      cursor: pointer;
      transition: transform .08s, box-shadow .08s;
    }

    .btn-ball:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #14532d, 0 4px 12px rgba(0, 0, 0, .4);
    }

    .timer-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .timer {
      font-size: 140px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: #f1f5f9;
      text-shadow: 0 0 24px rgba(251, 191, 36, .4);
      transition: color .2s;
    }

    .timer.warn {
      color: #fbbf24;
    }

    .timer.danger {
      color: #ef4444;
      animation: pulse .5s infinite alternate;
    }

    .timer.snap-count {
      color: #60a5fa;
      text-shadow: 0 0 32px rgba(96, 165, 250, .6);
    }

    @keyframes pulse {
      to {
        transform: scale(1.05);
      }
    }

    .status {
      font-size: 18px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 18px;
      font-weight: 800;
      text-transform: uppercase;
      color: white;
      cursor: pointer;
      transition: transform .08s, filter .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn-snap {
      font-size: 48px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 6px 0 #1e3a8a;
    }

    .btn-2kb {
      font-size: 32px;
      background: linear-gradient(135deg, #dc2626, #991b1b);
      box-shadow: 0 6px 0 #7f1d1d;
    }

    .btn:disabled {
      filter: grayscale(.6) brightness(.6);
      cursor: not-allowed;
    }

    .hidden {
      display: none !important;
    }

    #install-hint {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #64748b;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="app">
    <h1>🏈 HuddleSnap</h1>

    <div id="screen-setup" class="setup">
      <label for="duration">Время хаддла (сек)</label>
      <select id="duration">
        <option value="25">25</option>
        <option value="30" selected>30</option>
        <option value="35">35</option>
        <option value="40">40</option>
        <option value="45">45</option>
      </select>
      <button id="btn-start-setup" class="btn-ball">Продолжить</button>
    </div>

    <div id="screen-ready" class="hidden" style="flex:1; display:flex;">
      <button id="btn-ball-set" class="btn-ball">⚽ Мяч установлен</button>
    </div>

    <div id="screen-running" class="hidden" style="flex:1; display:flex; flex-direction:column; gap:12px;">
      <div class="timer-wrap">
        <div id="status" class="status">Хаддл</div>
        <div id="timer" class="timer">30</div>
      </div>
      <div class="controls">
        <button id="btn-snap" class="btn btn-snap">Снэп</button>
        <button id="btn-2kb" class="btn btn-2kb">2 КБ</button>
      </div>
    </div>
  </div>
  <div id="install-hint">PWA · Работает офлайн</div>

  <script>
    // ====== СОСТОЯНИЯ ======
    const State = { SETUP: 'setup', READY: 'ready', RUNNING: 'running', SNAP_WAIT: 'snap_wait' };
    let state = State.SETUP;

    // ====== DOM ======
    const $ = id => document.getElementById(id);
    const screenSetup = $('screen-setup');
    const screenReady = $('screen-ready');
    const screenRunning = $('screen-running');
    const selDuration = $('duration');
    const btnStartSetup = $('btn-start-setup');
    const btnBallSet = $('btn-ball-set');
    const btnSnap = $('btn-snap');
    const btn2kb = $('btn-2kb');
    const timerEl = $('timer');
    const statusEl = $('status');

    // ====== ЗВУК (MP3 файлы) ======
    const sounds = {
      whistle: new Audio('sounds/whistle.mp3'),
      siren: new Audio('sounds/siren.mp3'),
    };

    // Предзагрузка звуков
    Object.values(sounds).forEach(sound => {
      sound.preload = 'auto';
      sound.volume = 1.0;
    });

    function playSound(name) {
      const sound = sounds[name];
      if (!sound) return;

      // Останавливаем предыдущее воспроизведение и начинаем сначала
      sound.currentTime = 0;
      sound.play().catch(err => {
        console.warn(`Sound playback failed: ${name}`, err);
      });
    }

    // ====== ВИБРАЦИЯ ======
    const Vibrate = {
      tap: () => navigator.vibrate?.(20),
      snap: () => navigator.vibrate?.(60),
      ten: () => navigator.vibrate?.([100, 60, 100, 60, 250]),
      siren: () => navigator.vibrate?.([400, 120, 400, 120, 700]),
      stop: () => navigator.vibrate?.(0),
    };

    // ====== ЛОГИКА ======
    let duration = 30;
    let remaining = 30;
    let tickInterval = null;
    let snapInterval = null;
    let tenSecAnnounced = false;

    function showScreen(name) {
      screenSetup.classList.add('hidden');
      screenReady.classList.add('hidden');
      screenRunning.classList.add('hidden');
      if (name === 'setup') screenSetup.classList.remove('hidden');
      if (name === 'ready') screenReady.classList.remove('hidden');
      if (name === 'running') screenRunning.classList.remove('hidden');
    }

    function resetTimer() {
      clearInterval(tickInterval);
      clearInterval(snapInterval);
      tickInterval = null;
      snapInterval = null;
      tenSecAnnounced = false;
      remaining = duration;
      timerEl.textContent = remaining;
      timerEl.classList.remove('warn', 'danger', 'snap-count');
      statusEl.textContent = 'Хаддл';
      btnSnap.disabled = false;
      btn2kb.disabled = false;
      Vibrate.stop();
    }

    function startHuddle() {
      state = State.RUNNING;
      showScreen('running');
      resetTimer();
      playSound('whistle');
      Vibrate.siren();
      tickInterval = setInterval(tick, 1000);
    }

    function tick() {
      remaining--;
      timerEl.textContent = remaining;

      if (remaining <= 5) timerEl.classList.add('danger');
      else if (remaining <= 10) timerEl.classList.add('warn');

      if (remaining === 10 && !tenSecAnnounced) {
        tenSecAnnounced = true;
        speak('10 секунд');
        Vibrate.ten();
      }

      if (remaining <= 0) {
        clearInterval(tickInterval);
        tickInterval = null;
        playSound('siren');
        Vibrate.siren();
        speak('Время');
        setTimeout(() => {
          state = State.READY;
          showScreen('ready');
          Vibrate.stop();
        }, 2000);
      }
    }

    function onSnap() {
      if (state !== State.RUNNING) return;
      state = State.SNAP_WAIT;

      clearInterval(tickInterval);
      tickInterval = null;
      window.speechSynthesis.cancel();
      Vibrate.stop();

      timerEl.classList.remove('warn', 'danger');
      timerEl.classList.add('snap-count');
      statusEl.textContent = 'Снэп';

      btnSnap.disabled = true;
      btn2kb.disabled = false;
      Vibrate.snap();

      let countdown = 7;
      timerEl.textContent = countdown;

      snapInterval = setInterval(() => {
        countdown--;
        if (countdown > 0) {
          timerEl.textContent = countdown;
          statusEl.textContent = `Снэп через ${countdown}`;
          Vibrate.tap();
        } else {
          clearInterval(snapInterval);
          snapInterval = null;
          playSound('siren');
          Vibrate.siren();
          setTimeout(() => {
            state = State.READY;
            showScreen('ready');
            Vibrate.stop();
          }, 2000);
        }
      }, 1000);
    }

    function on2KB() {
      clearInterval(tickInterval);
      clearInterval(snapInterval);
      tickInterval = null;
      snapInterval = null;
      window.speechSynthesis.cancel();
      Vibrate.stop();
      Vibrate.tap();
      state = State.READY;
      showScreen('ready');
    }

    // Голосовое сообщение
    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ru-RU';
      u.rate = 1.0;
      u.pitch = 1.0;
      u.volume = 1.0;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }

    // ====== ОБРАБОТЧИКИ ======
    btnStartSetup.addEventListener('click', () => {
      duration = parseInt(selDuration.value, 10);
      state = State.READY;
      showScreen('ready');
    });

    btnBallSet.addEventListener('click', () => {
      Vibrate.tap();
      startHuddle();
    });

    btnSnap.addEventListener('click', onSnap);
    btn2kb.addEventListener('click', on2KB);

    // ====== PWA: Service Worker ======
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }

    showScreen('setup');
  </script>
</body>

</html>
