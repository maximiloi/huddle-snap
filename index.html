<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HuddleSnap" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <title>HuddleSnap v3.7</title>
</head>

<body>
  <div id="app">
    <h1>🏈 HuddleSnap<span class="version">v3.7</span></h1>

    <!-- Экран настройки -->
    <div id="screen-setup" class="setup">
      <div id="down-setup" class="down-display-top">1st</div>
      <label for="duration">Время хаддла (сек)</label>
      <select id="duration">
        <option value="25">25</option>
        <option value="30" selected>30</option>
        <option value="35">35</option>
        <option value="40">40</option>
        <option value="45">45</option>
      </select>
      <button id="btn-start-setup" class="btn-ball">Продолжить</button>
    </div>

    <!-- Экран готовности -->
    <div id="screen-ready" class="hidden ready-screen">
      <div id="down-ready" class="down-display-top">1st</div>
      <button id="btn-ball-set" class="btn-ball">🏈 Время запущено</button>
      <button id="btn-penalty-ready" class="btn btn-penalty hidden">Нарушение</button>
    </div>

    <!-- Экран работы таймера -->
    <div id="screen-running" class="hidden" style="flex:1; display:flex; flex-direction:column; gap:12px;">
      <div id="down-running" class="down-display-top">1st</div>
      <div class="timer-wrap">
        <div id="status" class="status">Хаддл</div>
        <div id="timer" class="timer">30</div>
      </div>
      <div class="controls">
        <button id="btn-snap" class="btn btn-snap">Снэп</button>
        <button id="btn-2kb" class="btn btn-2kb">2 КБ</button>
        <button id="btn-penalty" class="btn btn-penalty">Нарушение</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно нарушения -->
  <div id="modal-penalty" class="modal hidden">
    <div class="modal-content">
      <h2>Нарушение</h2>
      <p>Повтор дауна?</p>
      <div class="modal-buttons">
        <button id="btn-penalty-repeat" class="modal-btn modal-btn-repeat">Повтор</button>
        <button id="btn-penalty-loss" class="modal-btn modal-btn-loss">Потеря дауна</button>
        <button id="btn-penalty-cancel" class="modal-btn modal-btn-cancel">Отмена</button>
      </div>
    </div>
  </div>

  <div id="install-hint">PWA · Работает офлайн</div>

  <script>
    // ====== СОСТОЯНИЯ ======
    const State = { SETUP: 'setup', READY: 'ready', RUNNING: 'running', SNAP_WAIT: 'snap_wait' };
    let state = State.SETUP;
    let previousState = State.SETUP; // 🔥 Запоминаем состояние перед модалкой

    // ====== DOM ======
    const $ = id => document.getElementById(id);
    const screenSetup = $('screen-setup');
    const screenReady = $('screen-ready');
    const screenRunning = $('screen-running');
    const selDuration = $('duration');
    const btnStartSetup = $('btn-start-setup');
    const btnBallSet = $('btn-ball-set');
    const btnSnap = $('btn-snap');
    const btn2kb = $('btn-2kb');
    const btnPenalty = $('btn-penalty');
    const btnPenaltyReady = $('btn-penalty-ready');
    const timerEl = $('timer');
    const statusEl = $('status');
    const downSetup = $('down-setup');
    const downReady = $('down-ready');
    const downRunning = $('down-running');
    const modalPenalty = $('modal-penalty');
    const btnPenaltyRepeat = $('btn-penalty-repeat');
    const btnPenaltyLoss = $('btn-penalty-loss');
    const btnPenaltyCancel = $('btn-penalty-cancel');

    // ====== iOS ДЕТЕКТ ======
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const supportsVibration = 'vibrate' in navigator;

    // ====== ВИБРАЦИЯ ======
    const Vibrate = {
      tap: () => supportsVibration && navigator.vibrate(20),
      snap: () => supportsVibration && navigator.vibrate(60),
      ten: () => supportsVibration && navigator.vibrate([100, 60, 100, 60, 250]),
      siren: () => supportsVibration && navigator.vibrate([400, 120, 400, 120, 700]),
      stop: () => supportsVibration && navigator.vibrate(0),
    };

    // ====== ЗВУК (Web Audio API) ======
    let audioCtx = null;
    let audioBuffers = {};

    function getAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    async function loadSound(name, url) {
      try {
        const ctx = getAudio();
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
        audioBuffers[name] = audioBuffer;
        console.log(`✓ Sound loaded: ${name}`);
      } catch (err) {
        console.warn(`✗ Failed to load sound: ${name}`, err);
      }
    }

    function playBuffer(name) {
      const ctx = getAudio();
      const buffer = audioBuffers[name];
      if (!buffer) {
        console.warn(`Sound not loaded: ${name}`);
        return;
      }
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(ctx.destination);
      source.start(0);
    }

    function playWhistleSynth() {
      const ctx = getAudio();
      const t0 = ctx.currentTime;
      const dur = 1.3;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1800, t0);
      osc.frequency.exponentialRampToValueAtTime(2900, t0 + dur * 0.4);
      osc.frequency.exponentialRampToValueAtTime(2600, t0 + dur);

      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(0.75, t0 + 0.03);
      gain.gain.setValueAtTime(0.75, t0 + dur - 0.1);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

      osc.connect(gain).connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.05);
    }

    function playSirenSynth() {
      const ctx = getAudio();
      const t0 = ctx.currentTime;
      const duration = 3.5;
      const swings = 7;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      for (let i = 0; i <= swings; i++) {
        const t = t0 + (duration / swings) * i;
        const up = i % 2 === 0;
        osc.frequency.setValueAtTime(up ? 500 : 1000, t);
        osc.frequency.linearRampToValueAtTime(up ? 1000 : 500, t + duration / swings);
      }
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(0.45, t0 + 0.1);
      gain.gain.setValueAtTime(0.45, t0 + duration - 0.3);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + duration + 0.05);
    }

    function playSound(name) {
      if (audioBuffers[name]) {
        playBuffer(name);
      } else {
        if (name === 'whistle') playWhistleSynth();
        else if (name === 'siren') playSirenSynth();
      }
    }

    // ====== СЧЁТЧИК ДАУНОВ И ДРАЙВОВ ======
    let down = 1;
    let driveCount = 0;
    const downNames = ['1st', '2nd', '3rd', '4th'];

    function updateDownDisplay() {
      const downText = downNames[down - 1];
      downSetup.textContent = downText;
      downReady.textContent = downText;
      downRunning.textContent = downText;
    }

    function nextDown() {
      down++;
      if (down > 4) down = 1;
      updateDownDisplay();
    }

    function resetDown() {
      down = 1;
      driveCount = 0;
      updateDownDisplay();
    }

    function updatePenaltyButtonVisibility() {
      if (driveCount > 0) {
        btnPenaltyReady.classList.remove('hidden');
      } else {
        btnPenaltyReady.classList.add('hidden');
      }
    }

    // ====== ЛОГИКА ======
    let duration = 30;
    let remaining = 30;
    let tickInterval = null;
    let snapInterval = null;
    let tenSecAnnounced = false;

    function showScreen(name) {
      screenSetup.classList.add('hidden');
      screenReady.classList.add('hidden');
      screenRunning.classList.add('hidden');
      if (name === 'setup') screenSetup.classList.remove('hidden');
      if (name === 'ready') screenReady.classList.remove('hidden');
      if (name === 'running') screenRunning.classList.remove('hidden');
    }

    function stopAllTimers() {
      clearInterval(tickInterval);
      clearInterval(snapInterval);
      tickInterval = null;
      snapInterval = null;
      Vibrate.stop();
    }

    function resetTimer() {
      stopAllTimers();
      tenSecAnnounced = false;
      remaining = duration;
      timerEl.textContent = remaining;
      timerEl.classList.remove('warn', 'danger', 'snap-count');
      statusEl.textContent = 'Хаддл';
      btnSnap.disabled = false;
      btn2kb.disabled = false;
      btnPenalty.disabled = false;
    }

    function startHuddle() {
      state = State.RUNNING;
      showScreen('running');
      resetTimer();
      playSound('whistle');
      Vibrate.siren();
      tickInterval = setInterval(tick, 1000);
    }

    function tick() {
      remaining--;
      timerEl.textContent = remaining;

      if (remaining <= 5) timerEl.classList.add('danger');
      else if (remaining <= 10) timerEl.classList.add('warn');

      if (remaining === 10 && !tenSecAnnounced) {
        tenSecAnnounced = true;
        playSound('ten_seconds');
        Vibrate.ten();
      }

      if (remaining <= 0) {
        stopAllTimers();
        playSound('siren');
        Vibrate.siren();
        nextDown();
        driveCount++;
        updatePenaltyButtonVisibility();
        setTimeout(() => {
          state = State.READY;
          showScreen('ready');
        }, 2000);
      }
    }

    function onSnap() {
      if (state !== State.RUNNING) return;
      state = State.SNAP_WAIT;

      clearInterval(tickInterval);
      tickInterval = null;
      Vibrate.stop();

      timerEl.classList.remove('warn', 'danger');
      timerEl.classList.add('snap-count');
      statusEl.textContent = 'Снэп';

      btnSnap.disabled = true;
      btn2kb.disabled = false;
      btnPenalty.disabled = false;
      Vibrate.snap();

      let countdown = 7;
      timerEl.textContent = countdown;

      snapInterval = setInterval(() => {
        countdown--;
        if (countdown > 0) {
          timerEl.textContent = countdown;
          statusEl.textContent = `Снэп через ${countdown}`;
          Vibrate.tap();
        } else {
          stopAllTimers();
          playSound('siren');
          Vibrate.siren();
          nextDown();
          driveCount++;
          updatePenaltyButtonVisibility();
          setTimeout(() => {
            state = State.READY;
            showScreen('ready');
          }, 2000);
        }
      }, 1000);
    }

    function on2KB() {
      stopAllTimers();
      Vibrate.snap();
      nextDown();
      driveCount++;
      updatePenaltyButtonVisibility();
      state = State.READY;
      showScreen('ready');
    }

    // 🔥 Универсальная обработка кнопки "Нарушение"
    function onPenaltyClick() {
      // 🔥 Запоминаем состояние перед открытием модалки
      previousState = state;

      // 🔥 Если таймер идёт — останавливаем его
      if (state === State.RUNNING || state === State.SNAP_WAIT) {
        stopAllTimers();
      }

      // 🔥 Просто открываем модалку — НЕ запускаем таймер
      modalPenalty.classList.remove('hidden');
    }

    function onPenaltyRepeat() {
      modalPenalty.classList.add('hidden');
      Vibrate.tap();
      // Даун не меняется — возвращаемся на экран готовности
      state = State.READY;
      showScreen('ready');
    }

    function onPenaltyLoss() {
      modalPenalty.classList.add('hidden');
      Vibrate.tap();
      nextDown(); // Даун +1
      state = State.READY;
      showScreen('ready');
    }

    function onPenaltyCancel() {
      modalPenalty.classList.add('hidden');
      Vibrate.tap();
      // Возвращаемся на экран готовности (таймер уже остановлен)
      state = State.READY;
      showScreen('ready');
    }

    // ====== ОБРАБОТЧИКИ ======
    btnStartSetup.addEventListener('click', () => {
      duration = parseInt(selDuration.value, 10);
      getAudio();
      loadSound('whistle', 'sounds/whistle.mp3');
      loadSound('siren', 'sounds/siren.mp3');
      loadSound('ten_seconds', 'sounds/ten_seconds.mp3');
      resetDown();
      updatePenaltyButtonVisibility();
      Vibrate.tap();
      state = State.READY;
      showScreen('ready');
    });

    btnBallSet.addEventListener('click', () => {
      getAudio();
      Vibrate.tap();
      startHuddle();
    });

    btnSnap.addEventListener('click', onSnap);
    btn2kb.addEventListener('click', on2KB);
    btnPenalty.addEventListener('click', onPenaltyClick);
    btnPenaltyReady.addEventListener('click', onPenaltyClick); // 🔥 Теперь одна функция
    btnPenaltyRepeat.addEventListener('click', onPenaltyRepeat);
    btnPenaltyLoss.addEventListener('click', onPenaltyLoss);
    btnPenaltyCancel.addEventListener('click', onPenaltyCancel);

    // ====== PWA: Service Worker ======
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }

    showScreen('setup');
    updateDownDisplay();
  </script>
</body>

</html>
